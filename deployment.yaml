apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsechat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulsechat
  template:
    metadata:
      labels:
        app: pulsechat
    spec:
      containers:
      - name: pulsechat
        image: pulsechat:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
